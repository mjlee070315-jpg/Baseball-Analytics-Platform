<svg width="1024" height="1024" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diamond Analytics logo">
  <defs>
    <linearGradient id="diamondGrad" x1="20" y1="15" x2="180" y2="185" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B2A5B"/>
      <stop offset="55%" stop-color="#153E82"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <linearGradient id="diamondSheen" x1="30" y1="20" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DBEAFE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#DBEAFE" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="seamStroke" x1="56" y1="142" x2="124" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Outer hairline ring: keeps edge legible on both very light and very dark backgrounds -->
  <rect x="38" y="38" width="124" height="124" rx="17"
        transform="rotate(45 100 100)"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- Diamond frame -->
  <rect x="39" y="39" width="122" height="122" rx="16"
        transform="rotate(45 100 100)"
        fill="url(#diamondGrad)"/>

  <!-- Soft top-left sheen for depth (no blur, gradient-only) -->
  <rect x="39" y="39" width="122" height="122" rx="16"
        transform="rotate(45 100 100)"
        fill="url(#diamondSheen)"/>

  <!-- Rising seam-graph: baseball stitching that IS the trend line -->
  <path d="M 56.0 142.0 C 72.0 160.0, 88.0 158.0, 96.0 128.0 C 84.0 102.0, 90.0 82.0, 100.0 74.0 C 116.0 72.0, 116.0 54.0, 124.0 42.0" fill="none" stroke="url(#seamStroke)" stroke-width="3.4" stroke-linecap="round"/>

  <g>
      <line x1="57.87" y1="151.04" x2="62.12" y2="141.12" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="64.05" y1="155.44" x2="71.70" y2="147.81" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="77.22" y1="158.59" x2="73.62" y2="148.41" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="83.53" y1="156.78" x2="81.29" y2="146.21" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="93.83" y1="146.83" x2="83.42" y2="143.92" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="98.01" y1="138.35" x2="89.66" y2="131.50" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="97.54" y1="118.21" x2="89.19" y2="125.05" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="95.48" y1="110.62" x2="84.83" y2="108.82" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="94.51" y1="97.42" x2="84.22" y2="100.70" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="95.11" y1="92.78" x2="86.08" y2="86.85" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="98.81" y1="82.94" x2="88.13" y2="81.38" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="100.12" y1="81.02" x2="95.07" y2="71.47" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="106.99" y1="77.45" x2="100.37" y2="68.91" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="111.48" y1="74.82" x2="107.27" y2="64.87" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="118.70" y1="65.83" x2="108.11" y2="63.69" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="120.45" y1="62.14" x2="112.41" y2="54.92" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="124.52" y1="52.03" x2="113.73" y2="51.53" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
      <line x1="125.81" y1="49.08" x2="118.49" y2="41.14" stroke="#F8FAFC" stroke-width="2.6" stroke-linecap="round" opacity="0.92"/>
  </g>

  <!-- Data nodes along the seam, growing toward the peak -->
  <circle cx="56" cy="142" r="9" fill="url(#nodeGlow)"/>
  <circle cx="56" cy="142" r="3.6" fill="#F8FAFC"/>

  <circle cx="96" cy="128" r="10" fill="url(#nodeGlow)"/>
  <circle cx="96" cy="128" r="4.2" fill="#F8FAFC"/>

  <circle cx="100" cy="74" r="12" fill="url(#nodeGlow)"/>
  <circle cx="100" cy="74" r="4.8" fill="#F8FAFC"/>

  <circle cx="124" cy="42" r="15" fill="url(#nodeGlow)"/>
  <circle cx="124" cy="42" r="6" fill="#F8FAFC"/>
  <circle cx="124" cy="42" r="6" fill="none" stroke="#2563EB" stroke-width="1.6"/>
</svg>